name: CI

on:
  push:
    branches:
      - main
      - linux
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install tmux on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install tmux on macOS
        if: runner.os == 'macOS'
        run: brew install tmux
      - run: go test ./...
      - name: Report Go coverage
        if: runner.os == 'Linux'
        run: |
          go test ./... -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage.txt
          total=$(awk '/^total:/ { print $3 }' coverage.txt)
          total_number=${total%%%}
          if awk "BEGIN { exit !($total_number < 50.0) }"; then
            echo "::warning::Go coverage ${total} is below the current soft floor of 50.0%"
          fi
          {
            echo "## Go Coverage"
            echo
            echo "- Soft floor: 50.0%"
            echo "- Current total: ${total}"
            echo
            echo '```text'
            tail -n 20 coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Go coverage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: |
            coverage.out
            coverage.txt

  linux-go:
    name: Linux Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y tmux pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - run: go build -o bin/agx ./cmd/agx
      - run: VERSION=ci make package-linux
      - run: make release-scan
      - run: make release-checksums
      - run: shasum -a 256 -c dist/checksums.txt
      - run: |
          mkdir -p /tmp/agx-linux-smoke
          tar -xzf dist/agx-linux-amd64.tar.gz -C /tmp/agx-linux-smoke
          /tmp/agx-linux-smoke/agx --version
          /tmp/agx-linux-smoke/agx doctor

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json
      - run: npm --prefix desktop/frontend ci
      - run: npm --prefix desktop/frontend test
      - run: npm --prefix desktop/frontend run build

  release-verify:
    name: Release Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y tmux pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - run: npm --prefix desktop/frontend ci
      - run: make release-verify

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make -C docker smoke PLATFORM=linux/amd64
